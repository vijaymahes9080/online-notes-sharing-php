        <div id="page-wrapper">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-12">
                        <h1 class="page-header">
                            Welcome to your Profile 
                            <small>Vijay Mahes</small>
                        </h1>
                        
                        <form role="form" onsubmit="event.preventDefault(); alert('Profile Photo uploaded successfully');">
                            <div class="form-group">
                                <label for="post_image">Profile Image</label>
                                <img class="img-responsive" width="200" src="profilepics/profile.jpg" alt="Photo" id="profile-img">
                                <input type="file" name="image" required=""> 
                                <br>
                                <button type="submit" name="uploadphoto" class="btn btn-primary" value="upload photo">upload photo</button>
                            </div>
                        </form>

                        <form role="form" onsubmit="event.preventDefault(); alert('PROFILE UPDATED SUCCESSFULLY');">
                            <hr>
                            <div class="form-group">
                                <label for="user_title">User Name</label>
                                <input type="text" name="username" class="form-control" value="vijaymahes9080" readonly>
                            </div>

                            <div class="form-group">
                                <label for="user_author">Name</label>
                                <input type="text" name="name" class="form-control" value="Vijay Mahes" required>
                            </div>

                            <div class="form-group">
                                <label for="user_tag">Email</label>
                                <input type="email" name="email" class="form-control" value="vijaymahes9080@users.noreply.github.com" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="post_content">Bio</label>
                                <textarea class="form-control" name="bio" cols="30" rows="5">Developer & Administrator of Online Notes Sharing platform.</textarea>
                            </div>

                            <div class="form-group">
                                <label for="usertag">Current Password</label>
                                <input type="password" name="currentpassword" class="form-control" placeholder="Enter Current password" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="usertag">New Password <font color='brown'> (changing password is optional)</font></label>
                                <input type="password" name="newpassword" class="form-control" placeholder="Enter New Password">
                            </div>
                            
                            <div class="form-group">
                                <label for="usertag">Confirm New Password</label>
                                <input type="password" name="confirmnewpassword" class="form-control" placeholder="Re-Enter New Password">
                            </div>
                            <hr>

                            <button type="submit" name="update" class="btn btn-primary" value="Update User">Update User</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
